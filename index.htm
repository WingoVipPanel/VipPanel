<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Platform Panel - Premium Activation</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A0C10; color: #cbd5e1; }
        .bg-glow { filter: blur(100px); border-radius: 50%; position: absolute; z-index: 0; pointer-events: none; }
        .glass { background: rgba(21, 22, 25, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">
    <!-- Background Glows -->
    <div class="bg-glow w-full h-[500px] top-0 left-1/2 -translate-x-1/2 bg-blue-600/10"></div>
    <div class="bg-glow w-[300px] h-[300px] top-[20%] -right-[10%] bg-indigo-600/10"></div>
    <div class="bg-glow w-[300px] h-[300px] bottom-[10%] -left-[10%] bg-blue-600/10"></div>

    <!-- Header -->
    <header class="sticky top-0 z-50 glass border-b border-white/5 py-4">
        <div class="max-w-md mx-auto px-6 flex items-center justify-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg">
                <i data-lucide="crown" class="text-white w-7 h-7"></i>
            </div>
            <div class="flex flex-col">
                <h1 class="text-xl font-black text-white uppercase leading-none tracking-tighter">All Platform Panel</h1>
                <span class="text-[9px] font-black text-blue-400 uppercase tracking-[0.4em] mt-1">Premium Activation</span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 py-12 space-y-12 relative z-10">
        <!-- Trust Badges -->
        <div class="grid grid-cols-3 gap-4">
            <div class="glass p-4 rounded-[2rem] flex flex-col items-center gap-3 bg-emerald-500/5">
                <i data-lucide="shield-check" class="text-emerald-500 w-6 h-6"></i>
                <span class="text-[9px] font-black uppercase tracking-widest text-slate-400">Verified</span>
            </div>
            <div class="glass p-4 rounded-[2rem] flex flex-col items-center gap-3 bg-blue-500/5">
                <i data-lucide="users" class="text-blue-500 w-6 h-6"></i>
                <span class="text-[9px] font-black uppercase tracking-widest text-slate-400">10k+ Users</span>
            </div>
            <div class="glass p-4 rounded-[2rem] flex flex-col items-center gap-3 bg-amber-500/5">
                <i data-lucide="zap" class="text-amber-500 w-6 h-6"></i>
                <span class="text-[9px] font-black uppercase tracking-widest text-slate-400">Instant</span>
            </div>
        </div>

        <!-- Payment Card -->
        <section class="glass rounded-[3rem] p-10 space-y-10 shadow-2xl">
            <div class="text-center space-y-3">
                <p class="text-[11px] font-black text-blue-400 uppercase tracking-[0.4em]">Activation Fee</p>
                <h2 class="text-5xl font-black text-white tracking-tighter">₹400</h2>
            </div>

            <div class="flex justify-center relative">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-2xl" id="qrcode"></div>
            </div>

            <div class="text-center space-y-2">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">Scan to Pay</p>
                <div class="bg-white/5 border border-white/10 rounded-xl py-2 px-4 inline-block">
                    <p class="text-xs font-bold text-white tracking-wider">hyysumitx@fam</p>
                </div>
            </div>

            <button onclick="window.location.href='upi://pay?pa=hyysumitx@fam&pn=Sumit&am=400&cu=INR'" class="w-full py-6 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-[1.5rem] font-black text-xs uppercase tracking-[0.35em] flex items-center justify-center gap-4 shadow-xl active:scale-95 transition-transform">
                <i data-lucide="smartphone" class="w-6 h-6"></i>
                Pay via App
            </button>

            <div class="space-y-5">
                <div class="space-y-3">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Enter 12-Digit UTR Number</label>
                    <input type="text" id="utrInput" placeholder="Paste UTR Number Here" class="w-full bg-white/5 border border-white/10 rounded-2xl px-8 py-5 text-sm font-bold text-white placeholder:text-slate-700 focus:outline-none focus:border-blue-500/50 transition-all">
                </div>
                <button onclick="verifyPayment()" id="verifyBtn" class="w-full py-6 bg-white text-black rounded-2xl font-black text-xs uppercase tracking-[0.35em] shadow-xl active:scale-95 transition-transform">
                    Confirm Payment
                </button>
            </div>
        </section>

        <!-- Proof Section -->
        <section class="space-y-6">
            <h3 class="text-[11px] font-black text-white uppercase tracking-[0.25em] px-2">Winning Proof Inside</h3>
            <div class="grid grid-cols-2 gap-4">
                <!-- Images -->
                <div class="glass rounded-[2rem] overflow-hidden aspect-[9/16] relative group">
                    <img src="https://i.ibb.co/YTpkjt4z/Screenshot-20260401-132730.jpg" class="w-full h-full object-contain">
                    <div class="absolute bottom-4 left-4 text-[10px] font-black text-white uppercase">Live Hack Proof</div>
                </div>
                <div class="glass rounded-[2rem] overflow-hidden aspect-[9/16] relative group">
                    <img src="https://i.ibb.co/vxqq6vXT/Screenshot-20260401-132712.jpg" class="w-full h-full object-contain">
                    <div class="absolute bottom-4 left-4 text-[10px] font-black text-white uppercase">Live Hack Proof</div>
                </div>
            </div>
        </section>

        <!-- Hindi Reviews -->
        <section class="space-y-6">
            <h3 class="text-[11px] font-black text-white uppercase tracking-[0.25em] px-2">User Reviews</h3>
            <div class="glass p-6 rounded-3xl space-y-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-black text-white">R</div>
                    <div>
                        <h4 class="text-xs font-black text-white uppercase">Rahul Sharma</h4>
                        <div class="text-amber-500 text-[10px]">★★★★★</div>
                    </div>
                </div>
                <p class="text-xs text-slate-300 italic">"Bhai sach mein tool kamaal ka hai! Trusted banda hai Sumit bhai."</p>
            </div>
        </section>
    </main>

    <script>
        // Icons initialize
        lucide.createIcons();

        // QR Code generate
        new QRCode(document.getElementById("qrcode"), {
            text: "upi://pay?pa=hyysumitx@fam&pn=Sumit&am=400&cu=INR",
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Simple verification logic
        function verifyPayment() {
            const utr = document.getElementById('utrInput').value;
            const btn = document.getElementById('verifyBtn');
            if (utr.length < 12) {
                alert("Please enter a valid 12-digit UTR number.");
                return;
            }
            btn.innerHTML = "Verifying...";
            btn.disabled = true;
            setTimeout(() => {
                alert("Payment Confirmed! Aapka panel active ho gaya hai.");
                window.location.reload();
            }, 2000);
        }
    </script>
</body>
              </html>
